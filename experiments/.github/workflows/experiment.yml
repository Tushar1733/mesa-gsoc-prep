name: Testing Txperiment Idea


on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  run-experiments:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install native dependencies
        run: |
          pip install os

      - name: Run Dependency collector
        run: | 
          python dep_collector.py

      - name: Install dependencies
        run: |
          pip install -r requirements.txt